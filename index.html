<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles.css">
    <title>AI Personalized Birthday Poem Generator</title>
</head>
<body>
    <header>
        <h1>AI Personalized Birthday Poem Generator</h1>
    </header>

    <main>
        <form>
            <input type="text" placeholder="Enter the topic of the Birthday poem" autofocus required autocomplete="off" />
            <input type="submit" />
        </form>
        <div>
            Here’s to the next year, to the best year yet
            <br>
            Another year, another grace
        </div>
    </main>

    <footer>
        This AI project was coded by Phillipa Atieno and is <a href="https://github.com/Phillipa2/personalized-birthday-poem-generator" target="_blank">open-sourced on GitHub</a> and is <a href="https://personalized-birthday-poem-generator.netlify.app/" target="_blank">hosted on Netlify</a>.
    </footer>

    <script src="src/index.js"></script>
</body>
</html>
